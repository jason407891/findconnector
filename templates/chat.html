<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客服聊天</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
        }

        .container {
            display: flex;
            height: 100vh;
            background-color: #fff;
        }

        /* 側邊欄 - 對話列表 */
        .sidebar {
            width: 350px;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            background-color: #fafafa;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            background-color: #fff;
        }

        .sidebar-header h2 {
            font-size: 20px;
            margin-bottom: 15px;
            color: #333;
        }

        .new-chat-btn {
            width: 100%;
            padding: 10px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        .new-chat-btn:hover {
            background-color: #0056b3;
        }

        .conversations-list {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }

        .conversation-item {
            padding: 15px 20px;
            border-bottom: 1px solid #e0e0e0;
            cursor: pointer;
            transition: background-color 0.2s;
            background-color: #fff;
        }

        .conversation-item:hover {
            background-color: #f0f0f0;
        }

        .conversation-item.active {
            background-color: #e3f2fd;
            border-left: 4px solid #007bff;
        }

        .conversation-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .conversation-item-time {
            font-size: 12px;
            color: #999;
        }

        .conversation-item-preview {
            font-size: 13px;
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .unread-badge {
            background-color: #ff4444;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        /* 主聊天區域 */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #fff;
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            background-color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h3 {
            font-size: 18px;
            color: #333;
        }

        .chat-status {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-color: #f9f9f9;
        }

        .message {
            display: flex;
            margin-bottom: 10px;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.agent {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 60%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.4;
        }

        .message.user .message-content {
            background-color: #007bff;
            color: white;
            border-bottom-right-radius: 0;
        }

        .message.agent .message-content {
            background-color: #e0e0e0;
            color: #333;
            border-bottom-left-radius: 0;
        }

        .message-time {
            font-size: 11px;
            color: #999;
            margin-top: 5px;
            padding: 0 5px;
        }

        .message.user .message-time {
            text-align: right;
        }

        /* 輸入區域 */
        .chat-input-area {
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            background-color: #fff;
            display: flex;
            gap: 10px;
        }

        .input-field {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .input-field textarea {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: inherit;
            font-size: 14px;
            resize: none;
            max-height: 100px;
        }

        .input-field textarea:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
        }

        .send-btn {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            height: 40px;
            align-self: flex-end;
        }

        .send-btn:hover {
            background-color: #0056b3;
        }

        .send-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        /* 未選擇對話時的提示 */
        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
            font-size: 18px;
        }

        /* 模態框 - 新建對話 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .modal-header {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }

        .modal-body {
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-primary {
            background-color: #007bff;
            color: white;
        }

        .btn-primary:hover {
            background-color: #0056b3;
        }

        .btn-secondary {
            background-color: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background-color: #d0d0d0;
        }

        /* 加載動畫 */
        .loading {
            text-align: center;
            padding: 20px;
            color: #999;
        }

        .spinner {
            border: 3px solid #f0f0f0;
            border-top: 3px solid #007bff;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 提示訊息 */
        .alert {
            padding: 12px 16px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        /* 響應式設計 */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                max-height: 40vh;
            }

            .chat-area {
                height: 60vh;
            }

            .message-content {
                max-width: 80%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 側邊欄 - 對話列表 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>客服聊天</h2>
                <button class="new-chat-btn" onclick="openNewChatModal()">+ 新增對話</button>
            </div>
            <div class="conversations-list" id="conversationsList">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>加載中...</p>
                </div>
            </div>
        </div>

        <!-- 主聊天區域 -->
        <div class="chat-area">
            <div id="chatContainer" style="display: none; height: 100%; display: flex; flex-direction: column;">
                <div class="chat-header">
                    <div>
                        <h3 id="chatTitle">對話</h3>
                        <div class="chat-status" id="chatStatus"></div>
                    </div>
                </div>

                <div class="chat-messages" id="chatMessages"></div>

                <div class="chat-input-area">
                    <div class="input-field">
                        <textarea id="messageInput" placeholder="輸入您的消息..." rows="2"></textarea>
                    </div>
                    <button class="send-btn" onclick="sendMessage()">發送</button>
                </div>
            </div>

            <div id="emptyState" class="empty-state">
                選擇一個對話或創建新對話開始聊天
            </div>
        </div>
    </div>

    <!-- 新建對話模態框 -->
    <div class="modal" id="newChatModal">
        <div class="modal-content">
            <div class="modal-header">新增對話</div>
            <div class="modal-body">
                <div class="alert" id="modalAlert"></div>
                <div class="form-group">
                    <label for="subjectInput">主題（可選）</label>
                    <input type="text" id="subjectInput" placeholder="例如：產品問題">
                </div>
                <div class="form-group">
                    <label for="initialMessage">初始消息</label>
                    <textarea id="initialMessage" placeholder="請輸入您的初始消息..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeNewChatModal()">取消</button>
                <button class="btn btn-primary" onclick="createNewChat()">創建對話</button>
            </div>
        </div>
    </div>

    <script src="chat.js"></script>
</body>
</html>
